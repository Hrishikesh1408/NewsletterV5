<body class="bg-neutral-800 font-sans text-neutral-50">

<header class="flex items-center justify-between border-b border-neutral-700 px-6 py-4 bg-neutral-800">
<div class="flex items-center gap-3">

<h1 class="text-white text-xl font-bold">Team Editor</h1>
</div>
<div class="flex items-center gap-3">
<div class="text-right">
<div class="text-xs text-neutral-400">Logged in as</div>
<div id="user-info" class="text-sm font-semibold text-white">Loading...</div>
</div>
<div class="relative">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10 cursor-pointer" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuABDKecGZbcjAMHTdzWJmDTZ4j2efK4lIA0oG73-NW48_vIs_fliAvDVuWdUde6_kMdOFK238SNC23Zfj_8OBb9xhscciV0bT8-6TivAwiNviJW_grZVnY4Lkkkm2RrFrPTUOH_CQaATMbWUVWGNhklKL7ZvwQ8WYjuvbNPLg5005oVN3ZKTWyFWhWmVHa_ZeobLTU0ZsqOlHhpaGg2kbaNZbe0DTeJV_MG6AMrU5i5BrGVLsA_lmGW30rt3cRZL1jWp1KzQEn0O7zc");'></div>
</div>
</div>
</header>

<main class="flex-1 px-10 py-8">
<div class="mx-auto max-w-4xl">
<div id="editor-section" class="bg-neutral-800 border border-neutral-700 p-6 rounded-lg">
<h2 id="section-title" class="text-2xl font-bold mb-6 text-white border-b border-neutral-600 pb-3">Loading...</h2>
<div class="form-group">
<label id="section-label" class="block text-sm font-medium mb-2 text-neutral-300">Enter your updates:</label>
<textarea id="content-editor" class="w-full p-3 bg-white text-black rounded border min-h-32 resize-y"></textarea>
</div>

<div class="form-group mt-8">
<h3 class="text-lg font-semibold mb-4 text-white">🏆 Awards & Recognition</h3>
<div class="mb-4">
<button onclick="addAward()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">+ Add Award</button>
</div>
<div id="awards-container" class="space-y-4"></div>
</div>
<div class="mt-6 flex gap-4">
<button onclick="saveContent()" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Save Changes</button>
<button onclick="previewContent()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Preview</button>
</div>
</div>

<div id="preview-section" class="bg-neutral-800 border border-neutral-700 p-6 rounded-lg mt-6 hidden">
<h3 class="text-xl font-bold mb-4 text-white">Preview</h3>
<div id="preview-content" class="bg-neutral-700 p-4 rounded text-white"></div>
</div>
</div>
</main>
</div>

<script>
let editor;
let userData;
let currentProject;

const sectionConfig = {
  platform: { title: '🚀 Platform Updates', label: 'Platform Updates:' },
  presales: { title: '🔐 Pre-Sales Updates', label: 'Pre-Sales Updates:' },
  qa: { title: '🧪 Quality Assurance Updates', label: 'QA Updates:' },
  enterprise: { title: '🏢 Enterprise Solutions Updates', label: 'Enterprise Updates:' },
  sre: { title: '🛠 Site Reliability Engineering Updates', label: 'SRE Updates:' }
};

// Auto-refresh content from database
let autoRefreshInterval;

function startAutoRefresh() {
  autoRefreshInterval = setInterval(async () => {
    try {
      await loadContent();
      console.log('Auto-refreshed content from database');
    } catch (error) {
      console.error('Auto-refresh failed:', error);
    }
  }, 10000);
}

document.addEventListener('DOMContentLoaded', function() {
  console.log('Page loaded, starting initialization...');
  
  // Check auth
  const token = localStorage.getItem('token');
  if (!token) {
    console.log('No token found, redirecting to login');
    window.location.href = 'login.html';
    return;
  }

  // Get user data
  try {
    userData = JSON.parse(localStorage.getItem('userData') || '{}');
    console.log('User data:', userData);
  } catch (e) {
    console.error('Failed to parse user data:', e);
    window.location.href = 'login.html';
    return;
  }
  
  if (!userData.role || !sectionConfig[userData.role]) {
    console.log('Invalid role or config:', userData.role);
    alert('Access denied');
    window.location.href = 'login.html';
    return;
  }

  // Setup UI immediately
  console.log('Setting up UI...');
  document.getElementById('user-info').textContent = `${userData.firstName || userData.email || 'User'} (${userData.role})`;
  const config = sectionConfig[userData.role];
  document.getElementById('section-title').textContent = config.title;
  document.getElementById('section-label').textContent = config.label;

  // Initialize editor immediately
  console.log('Initializing Quill editor...');
  setTimeout(() => {
    try {
      editor = document.getElementById('content-editor');
      editor.placeholder = 'Enter your updates here...';
      console.log('Editor initialized successfully');
      
      // Setup project selection after editor is ready
      showProjectSelection();
      
    } catch (error) {
      console.error('Failed to initialize Quill:', error);
    }
  }, 100);
  
  // Add profile dropdown
  setTimeout(addProfileDropdown, 200);
});

async function showProjectSelection() {
  // Always show project selection for team users
  console.log('Showing project selection for team user');
  
  try {
    const response = await fetch('/api/projects');
    const projects = await response.json();
    
    if (projects.length === 0) {
      alert('No projects available. Please contact your administrator to create a project.');
      logout();
      return;
    }
    
    showProjectModal(projects);
    
  } catch (error) {
    console.error('Failed to load projects:', error);
  }
}

function showProjectModal(projects) {
  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
  modal.innerHTML = `
    <div class="bg-neutral-800 rounded-lg p-6 w-full max-w-md mx-4 border border-neutral-700">
      <h3 class="text-xl font-bold text-white mb-4">Select Project</h3>
      <p class="text-neutral-400 mb-4">Choose which newsletter project you want to work on:</p>
      <div class="space-y-2 mb-6">
        ${projects.map(project => `
          <button onclick="selectProject('${project._id}')" 
                  class="w-full text-left p-3 bg-neutral-700 hover:bg-neutral-600 rounded border border-neutral-600 text-white">
            <div class="font-medium">${project.name}</div>
            <div class="text-sm text-neutral-400">${project.description || 'No description'}</div>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  window.selectProject = function(projectId) {
    currentProject = projectId;
    localStorage.setItem('currentProject', projectId);
    document.body.removeChild(modal);
    loadContent();
    startAutoRefresh();
  };
}

async function loadContent() {
  console.log('Loading content for project:', currentProject);
  if (!currentProject || !editor) {
    console.log('No project or editor available');
    return;
  }
  
  const token = localStorage.getItem('token');
  
  try {
    const response = await fetch(`/api/newsletters/${currentProject}`, {
      headers: token ? { 'Authorization': `Bearer ${token}` } : {}
    });
    
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    console.log('Newsletter data loaded from database:', data);
    
    // Always load fresh content from database
    const roleField = userData.role;
    editor.value = data[roleField] ? data[roleField].replace(/<[^>]*>/g, '') : '';
    console.log(`Loaded ${roleField} content from database:`, data[roleField]);
    
    // Load awards filtered by department/role
    if (data.awards) {
      awards = data.awards.filter(award => award.department === userData.role);
      renderAwards();
    }
  } catch (error) {
    console.error('Failed to load content:', error);
  }
}

let awards = [];

function addAward() {
  const award = {
    id: Date.now(),
    name: '',
    type: '',
    description: '',
    submittedBy: userData.firstName,
    department: userData.role
  };
  awards.push(award);
  renderAwards();
}

function removeAward(id) {
  awards = awards.filter(a => a.id !== id);
  renderAwards();
}

function renderAwards() {
  const container = document.getElementById('awards-container');
  container.innerHTML = awards.map(award => `
    <div class="bg-neutral-700 p-4 rounded border">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
        <input type="text" placeholder="Winner Name" value="${award.name}" 
               onchange="updateAward(${award.id}, 'name', this.value)"
               class="p-2 bg-neutral-800 text-white border border-neutral-600 rounded">
        <select onchange="updateAward(${award.id}, 'type', this.value)"
                class="p-2 bg-neutral-800 text-white border border-neutral-600 rounded">
          <option value="">Select Award Type</option>
          <option value="lodestar" ${award.type === 'lodestar' ? 'selected' : ''}>Lodestar</option>
          <option value="spark" ${award.type === 'spark' ? 'selected' : ''}>Spark Award</option>
          <option value="performer" ${award.type === 'performer' ? 'selected' : ''}>Performer of the Month</option>
          <option value="other" ${award.type === 'other' ? 'selected' : ''}>Other</option>
        </select>
        <button onclick="removeAward(${award.id})" class="px-3 py-2 bg-red-600 text-white rounded hover:bg-red-700">Remove</button>
      </div>
      <textarea placeholder="Award description..." onchange="updateAward(${award.id}, 'description', this.value)"
                class="w-full p-2 bg-neutral-800 text-white border border-neutral-600 rounded" rows="2">${award.description}</textarea>
    </div>
  `).join('');
}

function updateAward(id, field, value) {
  const award = awards.find(a => a.id === id);
  if (award) {
    award[field] = value;
  }
}

async function saveContent() {
  if (!currentProject || !editor) {
    alert('No project selected or editor not ready');
    return;
  }
  
  const token = localStorage.getItem('token');
  if (!token) {
    alert('Not authenticated. Please login again.');
    window.location.href = 'login.html';
    return;
  }
  
  try {
    const content = editor.value;
    const roleField = userData.role; // platform, presales, qa, enterprise, sre
    
    console.log('Saving content:', { roleField, content, currentProject });
    
    const response = await fetch(`/api/newsletters/${currentProject}`, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        [roleField]: content, // Save to role-specific field
        awards: awards,
        userId: userData.id,
        userName: userData.firstName || userData.email || 'User',
        userRole: userData.role,
        section: userData.role
      })
    });
    
    console.log('Save response status:', response.status);
    
    if (response.ok) {
      const result = await response.json();
      console.log('Save result:', result);
      alert('Changes saved successfully!');
    } else {
      const error = await response.json();
      console.error('Save error:', error);
      alert(`Failed to save: ${error.error || 'Unknown error'}`);
    }
  } catch (error) {
    console.error('Save failed:', error);
    alert('Failed to save changes: ' + error.message);
  }
}

function previewContent() {
  const content = editor.value;
  const previewSection = document.getElementById('preview-section');
  const previewContent = document.getElementById('preview-content');
  
  if (content.trim() === '<p><br></p>' || !content.trim()) {
    previewContent.innerHTML = '<em>No content to preview</em>';
  } else {
    previewContent.innerHTML = content;
  }
  
  previewSection.classList.remove('hidden');
  previewSection.scrollIntoView({ behavior: 'smooth' });
}

function addProfileDropdown() {
  const profileBtn = document.querySelector('.bg-center.bg-no-repeat.aspect-square.bg-cover.rounded-full');
  if (!profileBtn) return;
  
  const dropdown = document.createElement('div');
  dropdown.className = 'absolute right-0 top-full mt-2 bg-neutral-800 border border-neutral-700 rounded-lg shadow-lg hidden z-50';
  dropdown.style.minWidth = '150px';
  
  dropdown.innerHTML = `
    <div class="px-4 py-2 border-b border-neutral-700 text-sm text-neutral-300">${userData.firstName || userData.email || 'User'} (${userData.role})</div>
    <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-white hover:bg-neutral-700">Logout</button>
  `;
  
  const container = profileBtn.parentElement;
  container.style.position = 'relative';
  container.appendChild(dropdown);
  
  profileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('hidden');
  });
  
  document.addEventListener('click', () => {
    dropdown.classList.add('hidden');
  });
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('userData');
  localStorage.removeItem('currentProject');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
