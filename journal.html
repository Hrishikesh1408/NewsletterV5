<option value="02">February</option>

<option value="04">April</option>

<option value="07">July</option>
<option value="08">August</option>
<option value="09">September</option>
<option value="10">October</option>

<script src="api.js"></script>
<script src="auth.js"></script>
<script src="login-check.js"></script>
<script>
let projects = [];
let filteredProjects = [];

// Load projects on page load
document.addEventListener('DOMContentLoaded', function() {
  loadProjects();
  initializeDropdown();
  populateYearOptions();
});

function populateYearOptions() {
  const yearSelect = document.getElementById('project-year');
  const currentYear = new Date().getFullYear();
  
  for (let year = currentYear - 2; year <= currentYear + 5; year++) {
    const option = document.createElement('option');
    option.value = year;
    option.textContent = year;
    if (year === currentYear) {
      option.selected = true;
    }
    yearSelect.appendChild(option);
  }
}

async function loadProjects() {
  try {
    const response = await fetch('/api/projects');
    projects = await response.json();
    filteredProjects = [...projects];
    renderProjects();
    updateDropdown();
  } catch (error) {
    console.error('Failed to load projects:', error);
    projects = [];
    filteredProjects = [];
    renderProjects();
    updateDropdown();
  }
}

function initializeDropdown() {
  const searchInput = document.getElementById('project-search');
  const dropdownToggle = document.getElementById('dropdown-toggle');
  const dropdown = document.getElementById('project-dropdown');
  
  // Search functionality
  searchInput.addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase();
    filteredProjects = projects.filter(project => 
      project.name.toLowerCase().includes(query) || 
      (project.description && project.description.toLowerCase().includes(query))
    );
    updateDropdown();
    showDropdown();
  });
  
  // Toggle dropdown
  dropdownToggle.addEventListener('click', function() {
    dropdown.classList.contains('hidden') ? showDropdown() : hideDropdown();
  });
  
  // Show dropdown on focus
  searchInput.addEventListener('focus', showDropdown);
  
  // Hide dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.relative')) {
      hideDropdown();
    }
  });
}

function showDropdown() {
  document.getElementById('project-dropdown').classList.remove('hidden');
}

function hideDropdown() {
  document.getElementById('project-dropdown').classList.add('hidden');
}

function updateDropdown() {
  const content = document.getElementById('dropdown-content');
  
  if (filteredProjects.length === 0) {
    content.innerHTML = '<div class="px-4 py-3 text-neutral-400 text-sm">No entries found</div>';
    return;
  }
  
  content.innerHTML = filteredProjects.map(project => `
    <div class="px-4 py-3 hover:bg-neutral-700 cursor-pointer border-b border-neutral-700 last:border-b-0" onclick="selectProject('${project._id}')">
      <div class="font-medium text-white">${project.name}</div>
      <div class="text-sm text-neutral-400">${project.description || 'No description'}</div>
    </div>
  `).join('');
}

function selectProject(id) {
  const project = projects.find(p => p._id === id);
  if (project) {
    document.getElementById('project-search').value = project.name;
    localStorage.setItem('currentProject', id);
    hideDropdown();
    
    // Trigger project change event for cross-page sync
    window.dispatchEvent(new CustomEvent('projectChanged', { detail: { projectId: id, project } }));
    
    openProject(id);
  }
}

function renderProjects() {
  const grid = document.getElementById('projects-grid');
  
  if (projects.length === 0) {
    grid.innerHTML = `
      <div class="col-span-full text-center py-12">
        <div class="text-neutral-400 mb-4">
          <span class="material-symbols-outlined text-6xl">folder_open</span>
        </div>
        <h3 class="text-lg font-medium text-white mb-2">No entries yet</h3>
        <p class="text-neutral-400 mb-4">Create your first newsletter entry to get started.</p>
        <button onclick="showCreateModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-500 text-white rounded-md hover:bg-opacity-90">
          <span class="material-symbols-outlined icon">add</span>
          Create Entry
        </button>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = projects.map(project => `
    <div class="bg-neutral-800 border border-neutral-700 rounded-lg p-6 hover:border-neutral-600 transition-colors">
      <div class="flex items-start justify-between mb-4">
        <div class="flex-1">
          <h3 class="text-lg font-semibold text-white mb-1">${project.name}</h3>
          <p class="text-sm text-neutral-400">${project.description || 'No description'}</p>
          <div class="flex items-center gap-2 mt-2">
            <span class="text-xs text-neutral-500">Template:</span>
            <span class="px-2 py-1 text-xs font-medium bg-primary-500/20 text-primary-300 rounded">${project.template || 'turbify'}</span>
          </div>
          ${project.month && project.year ? `
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-neutral-500">Period:</span>
            <span class="px-2 py-1 text-xs font-medium bg-green-500/20 text-green-300 rounded">${getMonthName(project.month)} ${project.year}</span>
          </div>` : ''}
        </div>
        <div class="flex gap-2">
          <button onclick="editProject('${project._id}')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-700 rounded">
            <span class="material-symbols-outlined text-sm">edit</span>
          </button>
          <button onclick="deleteProject('${project._id}')" class="p-2 text-neutral-400 hover:text-red-400 hover:bg-neutral-700 rounded">
            <span class="material-symbols-outlined text-sm">delete</span>
          </button>
        </div>
      </div>
      <div class="text-xs text-neutral-500 mb-4">
        Created: ${new Date(project.createdAt).toLocaleDateString()}
        ${project.lastModified ? `• Modified: ${new Date(project.lastModified).toLocaleDateString()}` : ''}
      </div>
      <div class="flex gap-2">
        <button onclick="openProject('${project._id}')" class="flex-1 px-3 py-2 bg-primary-500 text-white text-sm rounded hover:bg-opacity-90">
          Open Entry
        </button>
        <button onclick="viewAdmin('${project._id}')" class="px-3 py-2 bg-neutral-700 text-white text-sm rounded hover:bg-neutral-600">
          Admin
        </button>
      </div>
    </div>
  `).join('');
  
  // Show success message if project was just created
  const justCreated = localStorage.getItem('projectJustCreated');
  if (justCreated) {
    localStorage.removeItem('projectJustCreated');
    const project = projects.find(p => p._id === justCreated);
    if (project) {
      setTimeout(() => {
        alert(`Entry "${project.name}" created successfully!`);
      }, 100);
    }
  }
}

function showCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('create-modal').classList.add('flex');
  document.getElementById('project-name').focus();
}

function hideCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('create-modal').classList.remove('flex');
  document.getElementById('create-form').reset();
}

document.getElementById('create-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const name = document.getElementById('project-name').value.trim();
  const description = document.getElementById('project-description').value.trim();
  const template = document.getElementById('project-template').value;
  const month = document.getElementById('project-month').value;
  const year = document.getElementById('project-year').value;
  
  if (!name || !template || !month || !year) return;
  
  try {
    const response = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, description, template, month, year })
    });
    
    const result = await response.json();
    
    if (result.success) {
      // Set the newly created project as current
      localStorage.setItem('currentProject', result.project._id);
      localStorage.setItem('projectJustCreated', result.project._id);
      
      hideCreateModal();
      
      // Reload projects to show the new one
      await loadProjects();
      
      // If Turbify template is selected, redirect to editor
      if (template === 'turbify') {
        setTimeout(() => {
          window.location.href = 'dept_forms.html';
        }, 500);
      }
    } else {
      alert('Failed to create entry: ' + (result.error || 'Unknown error'));
    }
  } catch (error) {
    console.error('Failed to create project:', error);
    alert('Failed to create entry');
  }
});

async function deleteProject(id) {
  if (!confirm('Are you sure you want to delete this entry? This action cannot be undone.')) {
    return;
  }
  
  try {
    const response = await fetch(`/api/projects/${id}`, {
      method: 'DELETE'
    });
    
    const result = await response.json();
    
    if (result.success) {
      loadProjects();
    } else {
      alert('Failed to delete entry');
    }
  } catch (error) {
    console.error('Failed to delete project:', error);
    alert('Failed to delete entry');
  }
}

function openProject(id) {
  localStorage.setItem('currentProject', id);
  // Trigger project change event
  window.dispatchEvent(new CustomEvent('projectChanged', { detail: { projectId: id } }));
  window.location.href = 'dept_forms.html';
}

function viewAdmin(id) {
  localStorage.setItem('currentProject', id);
  window.location.href = 'admin.html';
}

function editProject(id) {
  const project = projects.find(p => p._id === id);
  if (!project) return;
  
  document.getElementById('project-name').value = project.name;
  document.getElementById('project-description').value = project.description || '';
  
  // Change form to edit mode
  const form = document.getElementById('create-form');
  form.onsubmit = async function(e) {
    e.preventDefault();
    
    const name = document.getElementById('project-name').value.trim();
    const description = document.getElementById('project-description').value.trim();
    
    try {
      const response = await fetch(`/api/projects/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description })
      });
      
      const result = await response.json();
      
      if (result.success) {
        hideCreateModal();
        loadProjects();
        // Reset form back to create mode
        form.onsubmit = null;
      } else {
        alert('Failed to update entry');
      }
    } catch (error) {
      console.error('Failed to update project:', error);
      alert('Failed to update entry');
    }
  };
  
  showCreateModal();
}

function getMonthName(monthNumber) {
  const months = {
    '01': 'January', '02': 'February', '03': 'March', '04': 'April',
    '05': 'May', '06': 'June', '07': 'July', '08': 'August',
    '09': 'September', '10': 'October', '11': 'November', '12': 'December'
  };
  return months[monthNumber] || monthNumber;
}

// Close modal on escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    hideCreateModal();
  }
});
</script>
