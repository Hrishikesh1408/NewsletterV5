<!DOCTYPE html>
<html>
<head>
    <title>Test Server Connection</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Newsletter Manager - Server Connection Test</h1>
    
    <button onclick="testConnection()">Test Server Connection</button>
    <button onclick="testProjects()">Test Projects API</button>
    <button onclick="createTestProject()">Create Test Project</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        
        function showResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `status ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
        }
        
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE}/test`);
                const data = await response.json();
                showResult(`Server is running! Response: ${JSON.stringify(data)}`);
            } catch (error) {
                showResult(`Server connection failed: ${error.message}`, false);
            }
        }
        
        async function testProjects() {
            try {
                const response = await fetch(`${API_BASE}/projects`);
                const data = await response.json();
                showResult(`Projects API working! Found ${data.length} projects`);
            } catch (error) {
                showResult(`Projects API failed: ${error.message}`, false);
            }
        }
        
        async function createTestProject() {
            try {
                const response = await fetch(`${API_BASE}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test Project ' + Date.now(),
                        description: 'Test project created from connection test',
                        template: 'turbify'
                    })
                });
                const data = await response.json();
                if (data.success) {
                    showResult(`Test project created successfully! ID: ${data.project._id}`);
                } else {
                    showResult(`Failed to create project: ${data.error}`, false);
                }
            } catch (error) {
                showResult(`Create project failed: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
