<div id="email-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">

</div>

<script>
async function loadPreview() {
  try {
    // Always try to load the latest from localStorage first (most recent)
    const savedHTML = localStorage.getItem('newsletter-html');
    if (savedHTML) {
      const iframe = document.getElementById('newsletter-preview');
      iframe.srcdoc = savedHTML;
      console.log('Loaded preview from localStorage');
      return;
    }
    
    // Try to load from API if no localStorage data
    const projectId = localStorage.getItem('currentProject');
    if (projectId) {
      const token = localStorage.getItem('token');
      const response = await fetch(`http://localhost:3000/api/newsletters/${projectId}/generate`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      
      if (response.ok) {
        const result = await response.json();
        if (result.html) {
          const iframe = document.getElementById('newsletter-preview');
          iframe.srcdoc = result.html;
          localStorage.setItem('newsletter-html', result.html);
          console.log('Loaded preview from API');
          return;
        }
      }
    }
    
    alert('No newsletter data found. Please generate a newsletter first.');
  } catch (error) {
    console.error('Failed to load preview:', error);
    alert('Failed to load preview. Please try again.');
  }
}

// Show email modal
function showEmailModal() {
  const savedHTML = localStorage.getItem('newsletter-html');
  if (!savedHTML) {
    alert('No newsletter found. Please generate a newsletter first.');
    return;
  }
  
  document.getElementById('email-modal').classList.remove('hidden');
  document.getElementById('email-modal').classList.add('flex');
  document.getElementById('email-recipients').focus();
}

// Hide email modal
function hideEmailModal() {
  document.getElementById('email-modal').classList.add('hidden');
  document.getElementById('email-modal').classList.remove('flex');
  document.getElementById('email-form').reset();
  document.getElementById('email-subject').value = 'Newsletter';
}

// Download HTML function
function downloadHTML() {
  const iframe = document.getElementById('newsletter-preview');
  let html = '';
  
  try {
    // Try to get HTML from iframe
    if (iframe.srcdoc) {
      html = iframe.srcdoc;
    } else {
      // Fallback to localStorage
      html = localStorage.getItem('newsletter-html') || '';
    }
    
    if (!html) {
      alert('No newsletter content to download. Please generate a newsletter first.');
      return;
    }
    
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `newsletter-${new Date().toISOString().split('T')[0]}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (error) {
    console.error('Download failed:', error);
    alert('Failed to download newsletter.');
  }
}

// Send email function
async function sendEmail(recipients, subject) {
  try {
    const html = localStorage.getItem('newsletter-html');
    
    const token = localStorage.getItem('token');
    const response = await fetch('http://localhost:3000/api/email/send', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        html: html,
        subject: subject,
        recipients: recipients
      })
    });
    
    const result = await response.json();
    
    if (result.success) {
      alert('Newsletter sent successfully!');
      hideEmailModal();
    } else {
      alert('Failed to send email: ' + (result.error || 'Unknown error'));
    }
  } catch (error) {
    console.error('Send email error:', error);
    alert('Failed to send email: ' + error.message);
  }
}

// Email form submission
document.getElementById('email-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const subject = document.getElementById('email-subject').value.trim();
  const recipientsText = document.getElementById('email-recipients').value.trim();
  
  if (!subject || !recipientsText) {
    alert('Please fill in both subject and recipients');
    return;
  }
  
  const recipients = recipientsText
    .split(/[,\n]/) 
    .map(email => email.trim())
    .filter(email => email && email.includes('@'))
    .join(',');
  
  if (!recipients) {
    alert('Please enter valid email addresses');
    return;
  }
  
  sendEmail(recipients, subject);
});

// Force refresh function
async function forceRefresh() {
  try {
    // Clear localStorage first
    localStorage.removeItem('newsletter-html');
    
    // Try to regenerate from API
    const projectId = localStorage.getItem('currentProject');
    if (projectId) {
      const token = localStorage.getItem('token');
      const response = await fetch(`http://localhost:3000/api/newsletters/${projectId}/generate`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        }
      });
      
      if (response.ok) {
        const result = await response.json();
        if (result.html) {
          const iframe = document.getElementById('newsletter-preview');
          iframe.srcdoc = result.html;
          localStorage.setItem('newsletter-html', result.html);
          console.log('Force refreshed from API');
          return;
        }
      }
    }
    
    alert('Failed to refresh. Please generate a newsletter first.');
  } catch (error) {
    console.error('Force refresh failed:', error);
    alert('Failed to refresh. Please try again.');
  }
}

// Listen for storage changes to auto-refresh preview
window.addEventListener('storage', function(e) {
  if (e.key === 'newsletter-html') {
    loadPreview();
  }
});

// Auto-load on page load
document.addEventListener('DOMContentLoaded', function() {
  loadPreview();
  
  // Close modal on escape key
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      hideEmailModal();
    }
  });
});
</script>
