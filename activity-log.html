<main class="flex-1 px-10 py-8">
<div class="mx-auto max-w-7xl">
<div class="mb-8">
<h2 class="text-3xl font-bold text-white mb-2">User Activity Log</h2>
<p class="text-neutral-400">Track all changes made by team members across journal entries</p>
</div>

<div class="bg-neutral-800 border border-neutral-700 rounded-lg overflow-hidden">
<div class="px-6 py-4 border-b border-neutral-700">
<div class="flex items-center justify-between">
<h3 class="text-lg font-semibold text-white">Recent Activity</h3>
<button onclick="refreshActivity()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Refresh</button>
</div>
</div>

<div class="overflow-x-auto">
<table class="w-full">
<thead class="bg-neutral-700">
<tr>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">User</th>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">Role</th>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">Section</th>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">Action</th>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">Journal Entry</th>
<th class="px-6 py-3 text-left text-xs font-medium text-neutral-300 uppercase tracking-wider">Time</th>
</tr>
</thead>
<tbody id="activity-table" class="bg-neutral-800 divide-y divide-neutral-700">
<tr>
<td colspan="6" class="px-6 py-4 text-center text-neutral-400">Loading activity...</td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</main>

<script src="auth.js"></script>
<script>
let allActivity = [];

document.addEventListener('DOMContentLoaded', function() {
  const token = localStorage.getItem('token');
  const userData = JSON.parse(localStorage.getItem('userData') || '{}');
  
  if (!token || !['owner', 'admin'].includes(userData.role)) {
    alert('Access denied. Owner/Admin access required.');
    window.location.href = 'journal.html';
    return;
  }
  
  loadActivity();
  addProfileDropdown();
});

async function loadActivity() {
  try {
    const response = await fetch('/api/projects');
    const projects = await response.json();
    
    allActivity = [];
    
    for (const project of projects) {
      try {
        const newsletterResponse = await fetch(`/api/newsletters/${project._id}`);
        const newsletterData = await newsletterResponse.json();
        
        if (newsletterData.changeLog && Array.isArray(newsletterData.changeLog)) {
          newsletterData.changeLog.forEach(log => {
            allActivity.push({
              ...log,
              projectName: project.name,
              projectId: project._id
            });
          });
        }
      } catch (error) {
        console.error(`Failed to load activity for project ${project._id}:`, error);
      }
    }
    
    // Sort by timestamp (newest first)
    allActivity.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    
    renderActivityTable();
  } catch (error) {
    console.error('Failed to load activity:', error);
    document.getElementById('activity-table').innerHTML = 
      '<tr><td colspan="6" class="px-6 py-4 text-center text-red-400">Failed to load activity</td></tr>';
  }
}

function renderActivityTable() {
  const tbody = document.getElementById('activity-table');
  
  if (allActivity.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-neutral-400">No activity found</td></tr>';
    return;
  }
  
  tbody.innerHTML = allActivity.slice(0, 50).map(activity => `
    <tr class="hover:bg-neutral-700">
      <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm font-medium text-white">${activity.userName || 'Unknown'}</div>
      </td>
      <td class="px-6 py-4 whitespace-nowrap">
        <span class="px-2 py-1 text-xs font-medium bg-blue-500/20 text-blue-300 rounded">${activity.userRole || 'unknown'}</span>
      </td>
      <td class="px-6 py-4 whitespace-nowrap">
        <span class="px-2 py-1 text-xs font-medium bg-green-500/20 text-green-300 rounded">${activity.section || 'general'}</span>
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">${activity.action || 'update'}</td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-300">${activity.projectName || 'Unknown'}</td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-400">${new Date(activity.timestamp).toLocaleString()}</td>
    </tr>
  `).join('');
}

function refreshActivity() {
  loadActivity();
}

function addProfileDropdown() {
  const profileBtn = document.querySelector('.bg-center.bg-no-repeat.aspect-square.bg-cover.rounded-full');
  if (!profileBtn) return;
  
  const userData = JSON.parse(localStorage.getItem('userData') || '{}');
  const dropdown = document.createElement('div');
  dropdown.className = 'absolute right-0 top-full mt-2 bg-neutral-800 border border-neutral-700 rounded-lg shadow-lg hidden z-50';
  dropdown.style.minWidth = '150px';
  
  dropdown.innerHTML = `
    <div class="px-4 py-2 border-b border-neutral-700 text-sm text-neutral-300">${userData.firstName} (${userData.role})</div>
    <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-white hover:bg-neutral-700">Logout</button>
  `;
  
  const container = profileBtn.parentElement;
  container.style.position = 'relative';
  container.appendChild(dropdown);
  
  profileBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('hidden');
  });
  
  document.addEventListener('click', () => {
    dropdown.classList.add('hidden');
  });
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('userData');
  localStorage.removeItem('currentProject');
  window.location.href = 'login.html';
}
</script>
